<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Houedannou Giannuzzi Midokpe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #161412;
      --fg:    #f2efe9;
      --gold:  #b9965f;
      --muted: #807a70;
      --hair:  rgba(242,239,233,.12);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Josefin Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding:
        max(env(safe-area-inset-top), clamp(28px, 5vh, 64px))
        clamp(24px, 6vw, 80px)
        max(env(safe-area-inset-bottom), clamp(24px, 4vh, 56px));
    }

    /* ── HAUT ── */
    .top {
      opacity: 0;
      animation: fade .8s ease forwards .1s;
    }
    .top p {
      font-size: clamp(.5rem, 1vw, .58rem);
      font-weight: 400;
      letter-spacing: .5em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── CENTRE — le nom, rien d'autre ── */
    .center {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .n-row { overflow: hidden; line-height: 1.06; }
    .n-row span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.3rem, min(8.8vw, 10.5vh), 6rem);
      letter-spacing: .01em;
      opacity: 0;
      transform: translateY(105%);
      animation: rise 1s cubic-bezier(.16,1,.3,1) forwards;
    }
    .n-row:nth-child(1) span { animation-delay: .2s; }
    .n-row:nth-child(2) span { animation-delay: .32s; }
    .n-row:nth-child(3) span { animation-delay: .44s; }

    .subtitle {
      margin-top: clamp(20px, 4vh, 44px);
      display: flex;
      align-items: baseline;
      gap: 16px;
      opacity: 0;
      animation: fade .8s ease forwards .9s;
    }
    .subtitle .role {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(.95rem, 2.2vw, 1.3rem);
      color: var(--gold);
    }
    .subtitle .dot { color: var(--muted); font-size:.8em; }
    .subtitle .locs {
      font-size: clamp(.55rem, 1.1vw, .65rem);
      font-weight: 300;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── BAS ── */
    .bottom {
      display: flex;
      flex-direction: column;
      gap: clamp(18px, 3vh, 30px);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
      border-top: 1px solid var(--hair);
      padding-top: clamp(14px, 2.5vh, 24px);
      opacity: 0;
      animation: fade .8s ease forwards 1.1s;
    }

    .meta-acts, .meta-contact {
      font-size: clamp(.52rem, 1vw, .6rem);
      font-weight: 300;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 2;
    }
    .meta-contact { text-align: right; text-transform: none; letter-spacing: .06em; }
    .meta-contact b { font-weight: 400; color: var(--fg); }

    /* ── BOUTONS — quatre, identiques, sobres ── */
    .cta {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;                       /* hairline entre les boutons */
      background: var(--hair);        /* la grille devient le séparateur */
      border: 1px solid var(--hair);
      opacity: 0;
      animation: fade .8s ease forwards 1.25s;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: clamp(16px, 3vh, 24px) 8px;
      background: var(--bg);
      color: var(--fg);
      text-decoration: none;
      font-size: clamp(.5rem, 1vw, .6rem);
      font-weight: 400;
      letter-spacing: .3em;
      text-transform: uppercase;
      transition: background .3s ease, color .3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover, .btn:focus-visible {
      background: var(--fg);
      color: var(--bg);
    }
    .btn:active { opacity:.8; }
    .btn svg { width: clamp(14px, 1.6vw, 17px); height: auto; flex-shrink: 0; }
    .btn-close { cursor: pointer; border: none; font-family: inherit; }

    /* ── ANIM ── */
    @keyframes rise { to { opacity:1; transform: translateY(0); } }
    @keyframes fade { to { opacity:1; } }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration:.01ms !important; animation-delay:0s !important; }
    }

    /* ── MOBILE ── */
    @media (max-width: 540px) {
      .meta { flex-direction: column; gap: 10px; }
      .meta-contact { text-align: left; }
      .btn .txt { display: none; }
      .btn { padding: 17px 8px; }
      .btn svg { width: 19px; }
    }

    /* ── PAYSAGE BAS ── */
    @media (max-height: 460px) and (orientation: landscape) {
      .n-row span { font-size: clamp(1.4rem, 10vh, 2.8rem); }
      .subtitle { margin-top: 10px; }
      .meta { display: none; }
      .btn { padding: 10px 6px; }
    }
  </style>
</head>
<body>
<div class="card">

  <header class="top">
    <p>Carte d'identité numérique</p>
  </header>

  <main class="center">
    <h1>
      <div class="n-row"><span>Houedannou</span></div>

    </h1>
    <div class="subtitle">
      <span class="role">Cheffe d'entreprise</span>

          <path d="M12.004 2C6.477 2 2 6.477 2 12.004c0 1.763.459 3.419 1.265 4.862L2 22l5.27-1.236A9.958 9.958 0 0012.004 22C17.531 22 22 17.523 22 11.996 22 6.477 17.531 2 12.004 2zm0 18.195a8.19 8.19 0 01-4.17-1.138l-.3-.178-3.126.733.757-3.046-.196-.312A8.162 8.162 0 013.82 12.004C3.82 7.48 7.48 3.82 12.004 3.82c4.525 0 8.185 3.66 8.185 8.184 0 4.524-3.66 8.191-8.185 8.191z" fill="currentColor"/>

    </nav>

  </footer>

</div>
</body>
</html>
